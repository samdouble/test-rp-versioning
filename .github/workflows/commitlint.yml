name: Commitlint

on: [pull_request]

jobs:
  commitlint:
     name: Commitlint
     runs-on: ubuntu-latest
     timeout-minutes: 1
     steps:
      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6

  core-commits-touch-modules:
    name: Core commits must touch A and B
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check core-only commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          fail=0
          for sha in $(git rev-list "$base".."$head"); do
            files=$(git diff-tree --no-commit-id --name-only -r "$sha")
            [ -z "$files" ] && continue
            only_core=true
            for f in $files; do
              case "$f" in
                core/*) ;;
                *) only_core=false; break ;;
              esac
            done
            if [ "$only_core" = true ]; then
              echo "::error::Commit $sha only touches core/. Release-please needs A/ or B/ touched so both modules get a release. Add a trivial change to A/build.gradle and B/build.gradle, or run: git config core.hooksPath .githooks && chmod +x .githooks/pre-commit"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
