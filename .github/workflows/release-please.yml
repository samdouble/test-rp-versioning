name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  checkout:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  sync-core-to-modules:
    name: Sync core changes to A and B
    runs-on: ubuntu-latest
    needs: checkout
    timeout-minutes: 1
    outputs:
      pushed: ${{ steps.sync.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Detect core-only change and add sync commits
        id: sync
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push or no prior commit, skipping sync"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git rev-parse --verify --quiet "$BEFORE" >/dev/null || ! git rev-parse --verify --quiet "$AFTER" >/dev/null; then
            echo "Cannot resolve push refs (e.g. force push), skipping sync"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          core_changed=false
          a_changed=false
          b_changed=false
          echo "$CHANGED" | grep -q '^core/' && core_changed=true || true
          echo "$CHANGED" | grep -q '^A/' && a_changed=true || true
          echo "$CHANGED" | grep -q '^B/' && b_changed=true || true
          if [ "$core_changed" = "false" ]; then
            echo "No core changes, skipping sync"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          has_feat=false
          has_fix=false
          while IFS= read -r subject; do
            type=$(echo "$subject" | cut -d'(' -f1 | cut -d':' -f1 | tr -d ' ')
            [ "$type" = "feat" ] && has_feat=true
            [ "$type" = "fix" ] && has_fix=true
          done < <(git log --format="%s" "$BEFORE".."$AFTER" -- core/ 2>/dev/null || true)
          if [ "$has_feat" = "true" ]; then
            COMMIT_TYPE=feat
          elif [ "$has_fix" = "true" ]; then
            COMMIT_TYPE=fix
          else
            echo "Core changes have no feat/fix commits, skipping sync"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          need_commit=false
          if [ "$a_changed" = "false" ]; then
            git commit --allow-empty -m "${COMMIT_TYPE}(moduleA): update for core changes"
            need_commit=true
          fi
          if [ "$b_changed" = "false" ]; then
            git commit --allow-empty -m "${COMMIT_TYPE}(moduleB): update for core changes"
            need_commit=true
          fi
          if [ "$need_commit" = "true" ]; then
            git push origin HEAD:master
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      - checkout
      - sync-core-to-modules
    outputs:
      A--tag_name: ${{ steps.release.outputs.A--tag_name}}
      A--release_created: ${{ steps.release.outputs.A--release_created}}
      B--tag_name: ${{ steps.release.outputs.B--tag_name}}
      B--release_created: ${{ steps.release.outputs.B--release_created}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Pull if sync pushed
        if: needs.sync-core-to-modules.outputs.pushed == 'true'
        run: git pull origin master
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Print release outputs for debugging
        continue-on-error: true
        run: |
          echo "Release outputs:"
          echo "${{ toJson(steps.release.outputs) }}"

  release-please-A:
    runs-on: ubuntu-latest
    if: ${{needs.release-please.outputs.A--release_created}}
    needs: release-please
    timeout-minutes: 1
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  release-please-B:
    runs-on: ubuntu-latest
    if: ${{needs.release-please.outputs.B--release_created}}
    needs: release-please
    timeout-minutes: 1
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master
