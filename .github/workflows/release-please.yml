name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      A--release_created: ${{ steps.release.outputs.A--release_created}}
      B--release_created: ${{ steps.release.outputs.B--release_created}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Print release outputs for debugging
        continue-on-error: false
        run: |
          echo "Release outputs:"
          cat << 'RELEASE_OUTPUTS_EOF'
          ${{ toJson(steps.release.outputs) }}
          RELEASE_OUTPUTS_EOF

  release-please-A:
    runs-on: ubuntu-latest
    if: ${{needs.release-please.outputs.A--release_created}}
    needs: release-please
    timeout-minutes: 1
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  release-please-B:
    runs-on: ubuntu-latest
    if: ${{needs.release-please.outputs.B--release_created}}
    needs: release-please
    timeout-minutes: 1
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master
