name: Publish B

on:
  push:
    tags:
      - 'moduleB-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: B
    steps:
      - uses: actions/checkout@v4
      - name: Install doctl
        run: |
          export TAG=${{ github.ref_name }}
          export VERSION="${TAG#*-}"
          export VERSION_NUMBER="${VERSION:1}"
          echo "Published module B version $VERSION_NUMBER"
